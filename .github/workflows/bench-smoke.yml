# Live smoke-tier run + mechanical functional-smoke checker (Issue #28).
# workflow_dispatch ONLY — owner/release-manager triggered; never auto-scheduled.
# Job fails if either run.py or the checker fails. The checker never invokes the judge.
#
# Mirror cache: bare clones under bench/workspace/mirrors/ are several GB per upstream
# (smoke touches grafana + discourse-graphite + cal.com). Caching them on GH-hosted
# runners avoids a cold multi-GB clone on every dispatch. A cache miss remains correct
# but slower; cache is best-effort and never required for the smoke verdict.
name: Bench Smoke (live)

on:
  workflow_dispatch:

jobs:
  smoke:
    name: Run Smoke-Tier Benchmark
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.3.2

      - name: Install Claude Code CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Write bench/.env
        env:
          BENCH_ANTHROPIC_API_KEY: ${{ secrets.BENCH_ANTHROPIC_API_KEY }}
        run: |
          echo "ANTHROPIC_API_KEY=${BENCH_ANTHROPIC_API_KEY}" > bench/.env

      - name: Cache bare mirrors
        uses: actions/cache@v4
        with:
          path: bench/workspace/mirrors
          key: bench-mirrors-${{ runner.os }}-v1
          restore-keys: |
            bench-mirrors-${{ runner.os }}-

      - name: Run smoke-tier benchmark
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 bench/run.py --tier smoke

      - name: Functional smoke check
        run: |
          set -euo pipefail
          RUN_ID="$(ls -1t bench/workspace/runs | head -1)"
          if [ -z "${RUN_ID}" ]; then
            echo "No run directory found under bench/workspace/runs" >&2
            exit 1
          fi
          echo "Checking run: ${RUN_ID}"
          python3 bench/run.py --check "${RUN_ID}"

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-smoke-runs
          path: bench/workspace/runs/**
          if-no-files-found: warn
