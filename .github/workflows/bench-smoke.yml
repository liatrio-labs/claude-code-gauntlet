# Live smoke-tier run of the code-gauntlet benchmark harness (bench/) plus the
# mechanical functional-smoke checker (Issue #28).
#
# Manual only: this workflow spends real Anthropic API credit and drives the
# Claude Code CLI + gh CLI against live PRs, so it runs on workflow_dispatch
# ONLY — never on push or pull_request. Job fails if either run.py or the
# checker fails. The checker never invokes the judge.
#
# Required repository secret:
#   BENCH_ANTHROPIC_API_KEY — Anthropic API key for the smoke-tier runs.
#     Mapped into bench/.env as ANTHROPIC_API_KEY for bench/run.py to read.
#
# Runner prerequisites (bench/run.py's prereq check fails fast with a fix
# message if any of these are missing):
#   - `claude` CLI on PATH — installed below via the official install script.
#   - `gh` CLI authenticated — satisfied via GH_TOKEN using the default
#     GITHUB_TOKEN (no extra secret needed).
#   - `uv` on PATH — installed below via astral-sh/setup-uv, used to run the
#     vendored scorer in its own isolated environment.
#
# Mirror cache: bare clones under bench/workspace/mirrors/ are several GB per
# upstream (smoke touches grafana + discourse-graphite + cal.com). Caching them
# on GH-hosted runners avoids a cold multi-GB clone on every dispatch. The cache
# key includes hashFiles('bench/golden/shas.json') so new golden pins invalidate
# it; restore + save are split so a failed checker step still persists mirrors
# populated during a successful smoke run. Save is gated on the smoke step
# succeeding — never on always() alone — so an interrupted/partial first
# populate cannot freeze a broken mirror set under the exact key (cache-hit
# would then skip every later save). ensure_mirror also heals unusable dirs.
# GitHub evicts caches after 7 days of no access — fine for per-sub-release
# dispatch, but a cold miss remains correct (just slower).
name: Bench Smoke (live)

on:
  workflow_dispatch:

jobs:
  smoke:
    name: Run Smoke-Tier Benchmark
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # upload-artifact needs the actions scope; naming only `contents` would
      # clear it and fail the always() upload after real API spend.
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Install Claude Code CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Write bench/.env
        env:
          BENCH_ANTHROPIC_API_KEY: ${{ secrets.BENCH_ANTHROPIC_API_KEY }}
        run: |
          echo "ANTHROPIC_API_KEY=${BENCH_ANTHROPIC_API_KEY}" > bench/.env

      - name: Restore bare mirrors
        id: mirrors-cache
        uses: actions/cache/restore@v4
        with:
          path: bench/workspace/mirrors
          # v2: invalidate any v1 entries that may have been saved mid-failure.
          key: bench-mirrors-${{ runner.os }}-${{ hashFiles('bench/golden/shas.json') }}-v2
          restore-keys: |
            bench-mirrors-${{ runner.os }}-

      - name: Run smoke-tier benchmark
        id: smoke-run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 bench/run.py --tier smoke

      - name: Functional smoke check
        run: |
          set -euo pipefail
          RUN_ID="$(ls -1t bench/workspace/runs | head -1)"
          if [ -z "${RUN_ID}" ]; then
            echo "No run directory found under bench/workspace/runs" >&2
            exit 1
          fi
          echo "Checking run: ${RUN_ID}"
          python3 bench/run.py --check "${RUN_ID}"

      # Persist only after a successful smoke populate. Checker failure still
      # saves (smoke-run succeeded); a mid-run kill/OOM does not, so the exact
      # key cannot freeze an incomplete mirror set. cache-hit skips re-save.
      - name: Save bare mirrors
        if: >-
          always()
          && steps.mirrors-cache.outputs.cache-hit != 'true'
          && steps.smoke-run.outcome == 'success'
        uses: actions/cache/save@v4
        with:
          path: bench/workspace/mirrors
          key: bench-mirrors-${{ runner.os }}-${{ hashFiles('bench/golden/shas.json') }}-v2

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-smoke-runs
          path: bench/workspace/runs/**
          if-no-files-found: warn
