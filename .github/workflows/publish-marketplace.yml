# Marketplace publish is intentionally separate from semantic-release.
#
# Diagnostic pin: restore the last-known-resolvable SHA (6b89d0b) and the
# exact caller permission envelope that parsed successfully in May 2026.
# @main and @933e23c both currently fail with startup_failure; if this pin
# also fails, Actions access from this repo to claude-plugins was revoked.
# If it runs, we can re-pin to a durable SHA once one is confirmed on main.
name: Publish to Marketplace

on:
  # HOLD (owner decision 2026-07-22): automatic publish-on-release is disabled
  # until v3.1.0 — v3.0.0 must NOT deploy to the company-wide marketplace.
  # Marketplace deployment is a manual owner action via workflow_dispatch.
  # Re-enable automatic publishing by restoring:
  #   release:
  #     types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v2.5.0)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish-to-marketplace:
    permissions:
      id-token: write
      contents: read
    uses: liatrio-labs/claude-plugins/.github/workflows/publish-to-marketplace.yml@6b89d0b06b290fecedb8eaaa389d92a5c48b5833
    with:
      tag: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}
      path: "."
      strict: true
